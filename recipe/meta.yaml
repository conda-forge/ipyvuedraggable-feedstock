{% set name = "ipyvuedraggable" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3e0a279ba17335c8d3220cd6251abea11c75bc52d35d5cd3cf70e7d8f4cfa942

build:
  noarch: python
  number: 1
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - ipyvue >=1.0.0,<2

test:
  requires:
    - python {{ python_min }}
  imports:
    - ipyvuedraggable

about:
  home: http://github.com/mariobuikhuizen/ipyvuedraggable
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Jupyter widget for Vue.Draggable'

  description: |
    Jupyter widget for Vue.Draggable

extra:
  recipe-maintainers:
    - mariobuikhuizen
